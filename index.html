<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lintel People — Employee Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0D0D27; --ink-soft:#565571; --paper:#F4EFE6; --paper-2:#ECE4D6; --card:#FFFFFF;
    --line:#DDD3C1; --line-2:#CFC4AD; --brass:#DFB05E; --brass-dark:#B08433; --brass-tint:#F5E9CF;
    --green:#4F7D52; --green-tint:#E7EFE3; --red:#A4503E; --red-tint:#F4E5E0;
    --amber:#B08433; --amber-tint:#F5E9CF; --grey:#6B6A78; --navy:#0D0D27; --navy-soft:#1C1C3A; --radius:10px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',system-ui,sans-serif; background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;}
  .display{font-family:'Fraunces',Georgia,serif;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit; width:100%; padding:11px 13px; font-size:13.5px; color:var(--ink);
    border:1px solid var(--line-2); border-radius:10px; background:#FCFBF8; outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--brass);}
  label.fld{display:block; margin-bottom:14px;}
  label.fld > span{font-size:12px; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:6px;}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:11px 20px; font-size:13.5px;
    font-weight:600; border-radius:10px; border:1px solid var(--ink); background:var(--ink); color:#fff;}
  .btn.brass{background:var(--brass); border-color:var(--brass);}
  .btn.ghost{background:transparent; color:var(--ink); border-color:var(--line-2);}
  .btn.sm{padding:7px 13px; font-size:12.5px;}
  .btn.full{width:100%;}
  .btn:disabled{opacity:.55; cursor:default;}

  .login-seal{width:70px;height:70px;border-radius:50%;display:block;margin:0 auto 18px;}
  .mk-img{width:36px;height:36px;border-radius:50%;flex-shrink:0;}
  /* ---------- login ---------- */
  #login{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background:radial-gradient(1200px 600px at 50% -10%, #202C46 0%, var(--ink) 55%);}
  .login-card{width:100%; max-width:400px; background:var(--card); border-radius:16px; padding:34px 30px;
    box-shadow:0 24px 60px rgba(9,14,26,.42); border:1px solid rgba(255,255,255,.06);}
  .login-mark{width:46px; height:46px; border-radius:50%; background:var(--brass-tint); border:1.5px solid var(--brass);
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:600; font-size:20px; color:var(--brass-dark); margin-bottom:18px;}
  .login-card{text-align:center;} .login-card .fld,.login-card .login-err,.login-card .cfg-warn{text-align:left;}
  .login-card h1{font-family:'Fraunces',serif; font-size:24px; font-weight:600; letter-spacing:.2px;}
  .login-card .sub{color:var(--grey); font-size:13px; margin:6px 0 24px;}
  .gbtn{width:100%; padding:12px 14px; border:1px solid var(--line-2); border-radius:10px; background:#fff;
    font-size:14.5px; font-weight:600; display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:16px;}
  .gbtn:disabled{opacity:.6;}
  .divider{display:flex; align-items:center; gap:12px; color:var(--grey); font-size:11.5px; margin:6px 0 16px;}
  .divider::before,.divider::after{content:""; flex:1; height:1px; background:var(--line);}
  .login-err{display:none; background:var(--red-tint); color:var(--red); font-size:12.5px; padding:9px 12px; border-radius:8px; margin-bottom:14px;}
  .cfg-warn{display:none; background:var(--amber-tint); color:var(--amber); font-size:12.5px; padding:10px 12px; border-radius:8px; margin-bottom:14px;}

  /* ---------- app shell ---------- */
  #app{display:none; min-height:100vh;}
  .shell{display:flex; min-height:100vh;}
  aside{width:236px; background:var(--ink); color:#fff; padding:24px 15px; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh; flex-shrink:0;}
  .brand{display:flex; align-items:center; gap:10px; margin-bottom:30px; padding-left:6px;}
  .brand .mk{width:34px; height:34px; border-radius:50%; background:var(--brass-tint); border:1.5px solid var(--brass);
    display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-weight:600; font-size:15px; color:var(--brass-dark);}
  .brand .nm{font-family:'Fraunces',serif; font-size:17px; font-weight:600;}
  .brand .tag{font-size:10px; color:#8B96AE; letter-spacing:.6px;}
  .nav-btn{display:flex; align-items:center; gap:11px; width:100%; padding:10px 12px; border-radius:9px; border:none;
    background:transparent; color:#9AA5BC; font-size:13.5px; font-weight:600; text-align:left; margin-bottom:3px; border-left:2px solid transparent;}
  .nav-btn:hover{color:#fff; background:rgba(255,255,255,.05);}
  .nav-btn.active{color:#fff; background:rgba(255,255,255,.09); border-left-color:var(--brass);}
  .who{margin-top:auto; border-top:1px solid rgba(255,255,255,.1); padding-top:14px;}
  .who .n{font-size:13px; font-weight:600;} .who .e{font-size:11px; color:#8B96AE; margin-top:1px;}
  main{flex:1; padding:30px 34px; max-width:1080px;}
  #menuBtn{display:none;}

  h2.page{font-family:'Fraunces',serif; font-size:26px; font-weight:600; margin-bottom:3px;}
  .page-sub{color:var(--grey); font-size:13px; margin-bottom:22px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; margin-bottom:16px;}
  .card h3{font-size:14px; font-weight:700; margin-bottom:2px;}
  .card .h3sub{font-size:12px; color:var(--grey); margin-bottom:14px;}
  .row-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .grid3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .stat{background:var(--card); border:1px solid var(--line); border-left:3px solid var(--brass); border-radius:var(--radius); padding:16px 18px;}
  .stat .v{font-family:'Fraunces',serif; font-size:24px; font-weight:600;}
  .stat .l{font-size:11px; color:var(--grey); text-transform:uppercase; letter-spacing:.4px; margin-top:3px;}

  table.t{width:100%; border-collapse:collapse; font-size:13px;}
  table.t th{text-align:left; padding:9px 12px; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--grey); border-bottom:1px solid var(--line);}
  table.t td{padding:11px 12px; border-bottom:1px solid var(--paper); vertical-align:middle;}
  .pill{display:inline-block; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600;}
  .pill.good{background:var(--green-tint); color:var(--green);}
  .pill.warn{background:var(--amber-tint); color:var(--amber);}
  .pill.bad{background:var(--red-tint); color:var(--red);}
  .pill.mute{background:#EEEAE0; color:var(--grey);}
  .empty{padding:22px; text-align:center; color:var(--grey); font-size:13px;}

  .doc-row{display:flex; align-items:center; justify-content:space-between; padding:13px 0; border-bottom:1px solid var(--paper);}
  .doc-row:last-child{border-bottom:none;}
  .doc-name{font-weight:600; font-size:13.5px;} .doc-meta{font-size:11.5px; color:var(--grey); margin-top:2px;}
  .drop{display:flex; align-items:center; gap:8px; border:1.5px dashed var(--line-2); border-radius:10px; padding:12px 13px;
    cursor:pointer; font-size:13px; color:var(--grey); background:#FCFBF8;}

  .week{display:flex; gap:8px; margin:6px 0 16px; flex-wrap:wrap;}
  .day{flex:1; min-width:78px; border:1px solid var(--line); border-radius:10px; padding:10px; text-align:center;}
  .day.done{background:var(--green-tint); border-color:#CFE4D8;}
  .day.today{border-color:var(--brass); box-shadow:0 0 0 2px var(--brass-tint);}
  .day .dow{font-size:10.5px; color:var(--grey); text-transform:uppercase; letter-spacing:.4px;}
  .day .dt{font-family:'Fraunces',serif; font-size:16px; font-weight:600; margin:2px 0;}
  .day .st{font-size:10px; font-weight:600;}
  .stamp{display:inline-block; border:2px solid var(--green); color:var(--green); font-weight:700; font-size:12px;
    padding:3px 10px; border-radius:6px; transform:rotate(-6deg); letter-spacing:1px; opacity:0; transition:opacity .35s;}
  .stamp.show{opacity:1;}

  /* modal + toast */
  .modal-bg{position:fixed; inset:0; background:rgba(15,20,32,.5); display:flex; align-items:center; justify-content:center; padding:20px; z-index:80;}
  .modal{background:var(--card); border-radius:14px; padding:24px; width:100%; max-width:440px; box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .modal h3{font-family:'Fraunces',serif; font-size:19px; font-weight:600; margin-bottom:16px;}
  #toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff;
    padding:11px 18px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none; transition:opacity .25s; z-index:90;}
  #toast.show{opacity:1;}
  .load{padding:40px; text-align:center; color:var(--grey); font-size:13px;}

  @media(max-width:760px){
    aside{position:fixed; left:-260px; z-index:70; transition:left .2s;}
    aside.open{left:0;}
    main{padding:20px 16px;}
    #menuBtn{display:inline-flex; margin-bottom:14px;}
    .grid3,.grid2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login">
  <div class="login-card">
    <img id="loginLogo" class="login-seal" alt="Lintel Space Atelier" />
    <h1 class="display">Lintel People</h1>
    <div class="sub">Employee self-service — letters, salary, leave, claims &amp; timesheets.</div>
    <div class="cfg-warn" id="cfgWarn">Supabase keys not set. Open this file and fill in the config at the top of the script.</div>
    <div class="login-err" id="loginErr"></div>
    <button class="gbtn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.57c2.08-1.92 3.28-4.74 3.28-8.09Z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.76c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.84 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84Z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.05l3.66 2.84C6.71 7.29 9.14 5.38 12 5.38Z"/></svg>
      Continue with Google
    </button>
    <div class="divider">or sign in with email</div>
    <label class="fld"><span>Work email</span><input id="emailIn" type="email" placeholder="you@lintelspace.com" autocomplete="username"/></label>
    <label class="fld"><span>Password</span><input id="passIn" type="password" placeholder="••••••••" autocomplete="current-password"/></label>
    <button class="btn brass full" id="signinBtn">Sign in</button>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <div class="shell">
    <aside id="sidebar">
      <div class="brand">
        <img id="brandLogo" class="mk-img" alt="LSA" />
        <div><div class="nm display">Lintel People</div><div class="tag">EMPLOYEE PORTAL</div></div>
      </div>
      <nav id="nav"></nav>
      <div class="who">
        <div class="n" id="whoName">—</div>
        <div class="e" id="whoMeta">—</div>
        <button class="nav-btn" id="logoutBtn" style="margin-top:12px">⏻ Sign out</button>
      </div>
    </aside>
    <main>
      <button class="btn ghost sm" id="menuBtn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>
      <div id="view"></div>
    </main>
  </div>
</div>

<div id="toast"></div>

function setLogos(){ const a=document.querySelector("#brandLogo"),b=document.querySelector("#loginLogo"); if(a)a.src=LSA_MONO; if(b)b.src=LSA_SEAL; }

/* ===================== helpers ===================== */
const $  = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const inr = n => "₹" + Number(n||0).toLocaleString("en-IN",{maximumFractionDigits:0});
const dMed = d => d ? new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}) : "—";
const monthLbl = d => new Date(d).toLocaleDateString("en-IN",{month:"long",year:"numeric"});
const todayISO = () => new Date().toISOString().slice(0,10);
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2600); }
function pill(status){
  const s=String(status||"").toLowerCase();
  const good=["approved","verified","paid","submitted","published"], warn=["pending","under_review","onboarding","draft"];
  const cls = good.includes(s)?"good": warn.includes(s)?"warn": (s==="missing"?"mute":"bad");
  const label = s.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());
  return `<span class="pill ${cls}">${esc(label)}</span>`;
}

let sb=null, ME=null, HOLIDAYS=[], OPENING={};
const cfgOk = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length>20;

/* ===================== storage ===================== */
async function uploadDoc(category, file){
  const safe = file.name.replace(/[^\w.\-]+/g,"_");
  const path = `${ME.id}/${category}/${Date.now()}_${safe}`;
  const { error } = await sb.storage.from(BUCKET).upload(path, file, { upsert:false });
  if(error) throw error;
  return path;
}
async function signedUrl(path){
  const { data, error } = await sb.storage.from(BUCKET).createSignedUrl(path, 120);
  if(error) throw error;
  return data.signedUrl;
}
async function openDoc(path){
  try{ const url = await signedUrl(path); window.open(url,"_blank"); }
  catch(e){ toast("Couldn't open the file: "+(e.message||"error")); }
}

/* ===================== auth ===================== */
if(!cfgOk){ $("#cfgWarn").style.display="block"; }
else {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const showErr = m => { const e=$("#loginErr"); e.style.display="block"; e.textContent=m; };
  const resetBtn = () => { const b=$("#signinBtn"); b.disabled=false; b.textContent="Sign in"; };

  const signIn = async () => {
    const email=($("#emailIn").value||"").trim().toLowerCase(), password=$("#passIn").value;
    $("#loginErr").style.display="none";
    if(!email.endsWith("@"+ALLOWED_DOMAIN)) return showErr("Please use your @"+ALLOWED_DOMAIN+" email address.");
    if(!password) return showErr("Please enter your password.");
    $("#signinBtn").disabled=true; $("#signinBtn").textContent="Signing in…";
    try{
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if(error){ resetBtn(); return showErr(error.message); }
      if(data?.session){ resetBtn(); enter(data.session); } else { resetBtn(); showErr("Signed in but no session. Try again."); }
    }catch(e){ resetBtn(); showErr("Login failed: "+(e.message||"unknown error")); }
  };
  $("#signinBtn").onclick=signIn;
  $("#passIn").addEventListener("keydown",e=>{ if(e.key==="Enter") signIn(); });

  const gBtn=$("#googleBtn");
  gBtn.onclick=async()=>{
    gBtn.disabled=true;
    try{
      const { error } = await sb.auth.signInWithOAuth({
        provider:"google",
        options:{ redirectTo: location.href.split("#")[0].split("?")[0], queryParams:{ hd:ALLOWED_DOMAIN, prompt:"select_account" } }
      });
      if(error){ gBtn.disabled=false; showErr(error.message); }
    }catch(e){ gBtn.disabled=false; showErr("Google sign-in failed: "+(e.message||"unknown")); }
  };
  $("#logoutBtn").onclick=async()=>{ try{ if(ME) await sb.from("hr_attendance").update({last_logout:new Date().toISOString()}).eq("employee_id",ME.id).eq("day",todayISO()); }catch(e){} await sb.auth.signOut(); location.reload(); };
  sb.auth.onAuthStateChange((_e,session)=> session ? enter(session) : null);
  sb.auth.getSession().then(({data})=> data.session && enter(data.session)).catch(()=>{});
}

async function enter(session){
  if(window.__entered) return; window.__entered=true;
  try{
    const email = session.user.email || "";
    if(!email.endsWith("@"+ALLOWED_DOMAIN)){
      await sb.auth.signOut(); alert("Lintel People is restricted to @"+ALLOWED_DOMAIN+" accounts."); return location.reload();
    }
    // resolve the employee record (RLS returns only the caller's own row)
    const { data:emp } = await sb.from("employees").select("*").eq("work_email", email).maybeSingle();
    if(!emp){
      await sb.auth.signOut();
      alert("You're signed in, but you're not set up as a Lintel employee yet. Please contact HR to be added.");
      return location.reload();
    }
    ME = emp;
    markLogin();
    await loadHolidays();
    try{ const {data:_op}=await sb.from("hr_leave_opening").select("leave_type,taken").eq("employee_id",ME.id).eq("year",new Date().getFullYear()); OPENING={}; (_op||[]).forEach(o=>OPENING[o.leave_type]=Number(o.taken)); }catch(e){ OPENING={}; }
    $("#login").style.display="none";
    $("#app").style.display="block";
    $("#whoName").textContent = ME.full_name;
    $("#whoMeta").textContent = [ME.emp_code, ME.designation].filter(Boolean).join(" · ") || email;
    buildNav();
    render("overview");
  }catch(e){
    window.__entered=false;
    const el=$("#loginErr"); el.style.display="block"; el.textContent="Could not load your portal: "+(e.message||"unknown")+". Refresh and try again.";
    const b=$("#signinBtn"); b.disabled=false; b.textContent="Sign in";
  }
}

function leaveModal(){
  openModal("Apply for leave", `
    <label class="fld"><span>Leave type</span>
      <select id="lv-type">${(onProbation()?[["lop","Loss of pay"]]:LEAVE_TYPES).map(([v,l])=>`<option value="${v}">${l}</option>`).join("")}</select></label>
    ${onProbation()?'<div class="cfg-warn" style="display:block">You are on probation — only Loss of Pay applies. Paid leave accrues after confirmation.</div>':''}
    <div class="grid2">
      <label class="fld"><span>From</span><input id="lv-from" type="date"/></label>
      <label class="fld"><span>To</span><input id="lv-to" type="date"/></label>
    </div>
    <label class="fld"><span>Reason</span><input id="lv-reason" placeholder="e.g. Family function"/></label>
    <div id="lv-hint" class="h3sub" style="margin-bottom:6px"></div>
    <div class="h3sub" style="margin-bottom:12px;line-height:1.5">CL needs 2 days notice, EL needs 7. Leave during a project handover needs prior approval.</div>
    <button class="btn brass full" onclick="submitLeave()">Send request</button>`);
  ["lv-from","lv-to"].forEach(id=>$("#"+id).addEventListener("change",updateLeaveHint));
}
async function submitLeave(){
  const type=$("#lv-type").value, from=$("#lv-from").value, to=$("#lv-to").value, reason=$("#lv-reason").value.trim();
  if(!from||!to) return toast("Pick both dates.");
  const days=leaveSpan(from,to);
  if(days<1) return toast("The end date can't be before the start date.");
  if(onProbation() && type!=="lop") return toast("You're on probation — only Loss of Pay can be applied right now.");
  if(LEAVE_QUOTA[type]!==undefined){
    const avail=accrued(type)-await usedThisYear(type);
    if(days>avail) return toast(`Only ${avail} day(s) of ${labelFor(type)} available. Apply the balance as Loss of Pay.`);
  }
  if(NOTICE[type]!==undefined){
    const noticeDays=Math.round((new Date(from)-new Date(todayISO()))/86400000);
    if(noticeDays<NOTICE[type]) return toast(`${labelFor(type)} needs ${NOTICE[type]} days advance notice. For urgent time off, use Sick leave or Loss of Pay.`);
  }
  if(type==="comp_off"){
    const avail=await availableCompOff();
    if(days>avail) return toast(`You have ${avail} comp-off day(s) available.`);
  }
  const { error } = await sb.from("hr_leave_requests").insert({
    employee_id:ME.id, leave_type:type, from_date:from, to_date:to, days, reason, status:"pending" });
  if(error) return toast("Couldn't submit: "+error.message);
  closeModal(); toast("Leave request sent to your manager."); render("leave");
}

function weekDates(){
  const d=new Date(); const dow=(d.getDay()+6)%7; d.setDate(d.getDate()-dow);
  return Array.from({length:5},(_,i)=>{ const x=new Date(d); x.setDate(d.getDate()+i); return x.toISOString().slice(0,10); });
}

  const byDate={}; (data||[]).forEach(t=>byDate[t.work_date]=t);
  const today=todayISO(); const todayRow=byDate[today];
  const DOW=["Mon","Tue","Wed","Thu","Fri"];

    <div class="card">

          <div class="dow">${DOW[i]}</div><div class="dt">${new Date(d).getDate()}</div>

async function submitTimesheet(){
  const entry=$("#ts-entry").value.trim(), lin=$("#ts-in").value, lout=$("#ts-out").value;
  if(!entry) return toast("Add a line about what you worked on.");
  if(new Date().getHours()<19) return toast("Timesheet can be submitted only after 7:00 PM.");
  let hours=null;
  if(lin&&lout){ const [h1,m1]=lin.split(":").map(Number),[h2,m2]=lout.split(":").map(Number); let mins=(h2*60+m2)-(h1*60+m1); if(mins<0)mins+=1440; hours=Math.round(mins/6)/10; }
  const btn=$("#ts-submit"); btn.disabled=true; btn.textContent="Submitting…";
  const { error } = await sb.from("hr_timesheets").insert({
    employee_id:ME.id, work_date:todayISO(), entry, login_time:lin||null, logout_time:lout||null, hours, status:"submitted" });
  if(error){ btn.disabled=false; btn.textContent="Submit for today"; return toast("Couldn't submit: "+error.message); }
  $("#ts-stamp").classList.add("show"); toast("Timesheet submitted for today."); setTimeout(()=>render("timesheet"),700);
}

async function loadHolidays(){ try{ const {data}=await sb.from("hr_holidays").select("*"); HOLIDAYS=data||[]; }catch(e){ HOLIDAYS=[]; } }
function workingLeaveDays(from,to){
  const s=new Date(from), e=new Date(to); let days=0,wk=0,hol=0;
  const hset=new Set(HOLIDAYS.map(h=>h.holiday_date));
  if(e<s) return {days:0,weekends:0,holidays:0};
  for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)){
    const iso=d.toISOString().slice(0,10), dow=d.getDay();
    if(dow===0||dow===6){ wk++; continue; }
    if(hset.has(iso)){ hol++; continue; }
    days++;
  }
  return {days,weekends:wk,holidays:hol};
}
function updateLeaveHint(){
  const f=$("#lv-from").value, t=$("#lv-to").value, h=$("#lv-hint");
  if(!f||!t){ h.textContent=""; return; }
  const total=leaveSpan(f,t); if(total<1){ h.textContent="End date is before start date."; return; }
  const b=workingLeaveDays(f,t); const off=b.weekends+b.holidays;
  h.textContent = total+" day"+(total!==1?"s":"")+" will be deducted"+(off>0?` (includes ${off} weekend/holiday day${off>1?"s":""} — sandwich rule)`:"");
}
async function renderHolidays(el){
  if(!HOLIDAYS.length) await loadHolidays();
  const rows=HOLIDAYS.slice().sort((a,b)=> a.holiday_date<b.holiday_date?-1:1);
  el.innerHTML=`
    <h2 class="page display">Holidays 2026</h2>

    <div class="card">

        ${rows.map(h=>{ const d=new Date(h.holiday_date); return `<tr>
          <td style="font-weight:600">${d.toLocaleDateString("en-IN",{day:"numeric",month:"short"})}</td>
          <td>${d.toLocaleDateString("en-IN",{weekday:"long"})}</td>
          <td>${esc(h.name)}</td>
          <td>${h.type==="national"?'<span class="pill good">National</span>':'<span class="pill mute">Regional</span>'}</td>
        </tr>`; }).join("")}</tbody></table>`
        : `<div class="empty">No holidays configured yet.</div>`}
    </div>`;
}

/* ===================== helpers (dates) ===================== */
function weekBounds(iso){ const d=new Date(iso); const dow=(d.getDay()+6)%7; const mon=new Date(d); mon.setDate(d.getDate()-dow); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return [mon.toISOString().slice(0,10), sun.toISOString().slice(0,10)]; }
function addMonths(iso,n){ const d=new Date(iso); d.setMonth(d.getMonth()+Number(n||0)); return d.toISOString().slice(0,10); }
const LEAVE_TYPES=[["casual","Casual leave"],["sick","Sick leave"],["earned","Earned / privilege"],["comp_off","Comp-off"],["maternity","Maternity"],["paternity","Paternity"],["bereavement","Bereavement"],["lop","Loss of pay"]];

function autoBreakup(){

  const basic=Math.round(m*0.40), hra=Math.round(basic*0.5), pfEr=Math.round(basic*0.12);
  const special=Math.round(m-basic-hra-pfEr), pfEe=Math.round(basic*0.12);
  document.querySelector("#sal-basic").value=basic; document.querySelector("#sal-hra").value=hra;
  document.querySelector("#sal-special").value=Math.max(0,special); document.querySelector("#sal-pf").value=pfEe; document.querySelector("#sal-pt").value=200;
}

/* ===================== LEAVE ACCRUAL (Lintel policy) ===================== */
const LEAVE_QUOTA={casual:6, sick:6, earned:10};   // days/year, credited pro-rata after confirmation
function labelFor(t){ const m=LEAVE_TYPES.find(x=>x[0]===t); return m?m[1]:t; }
function leaveSpan(from,to){ return Math.round((new Date(to)-new Date(from))/86400000)+1; }  // calendar-inclusive (sandwich rule)
function confirmationDate(){ return ME.date_of_joining ? addMonths(ME.date_of_joining, ME.probation_months==null?6:ME.probation_months) : null; }
function onProbation(){ const c=confirmationDate(); return c ? (new Date() < new Date(c)) : false; }
function accruedFor(doj, prob, type){
  const annual=LEAVE_QUOTA[type]; if(annual===undefined) return 0;
  if(!doj) return annual;
  const conf=addMonths(doj, prob==null?6:prob);
  const now=new Date(), c=new Date(conf);
  if(now<c) return 0;
  const yStart=new Date(now.getFullYear(),0,1);
  const start = c>yStart ? c : yStart;
  let months=(now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth()) + 1;
  months=Math.max(0,Math.min(12,months));
  return Math.round(annual/12*months*2)/2;
}
function accrued(type){ return accruedFor(ME.date_of_joining, ME.probation_months, type); }
function openingTaken(type){ return Number(OPENING[type]||0); }
async function usedThisYear(type){
  const y=new Date().getFullYear();
  const {data}=await sb.from("hr_leave_requests").select("days").eq("employee_id",ME.id).eq("leave_type",type).eq("status","approved").gte("from_date",y+"-01-01").lte("from_date",y+"-12-31");
  return (data||[]).reduce((a,r)=>a+Number(r.days||0),0) + openingTaken(type);
}

function inWords(num){
  num=Math.round(Number(num)||0); if(num===0) return "Zero Rupees Only";
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  const two=n=>n<20?a[n]:b[Math.floor(n/10)]+(n%10?" "+a[n%10]:"");
  const three=n=>(n>=100?a[Math.floor(n/100)]+" Hundred"+(n%100?" ":""):"")+(n%100?two(n%100):"");
  let str="", cr=Math.floor(num/10000000); num%=10000000;
  let l=Math.floor(num/100000); num%=100000; let t=Math.floor(num/1000); num%=1000;
  if(cr) str+=three(cr)+" Crore "; if(l) str+=three(l)+" Lakh "; if(t) str+=three(t)+" Thousand "; if(num) str+=three(num);
  return str.trim()+" Rupees Only";
}

function readOffer(){
  const g=id=>{const el=document.querySelector("#of-"+id);return el?el.value.trim():"";};
  return {name:g("name"),email:g("email"),phone:g("phone"),addr:g("addr"),desig:g("desig"),dept:g("dept"),
    report:g("report")||"the Director – Operations",net:Number(g("net")||0),ctc:Number(g("ctc")||0),
    doj:g("doj"),valid:g("valid"),loc:g("loc")||"Bengaluru",days:g("days")||"Monday to Saturday",
    prob:Number(g("prob")||3),notice:Number(g("notice")||1)};
}
function offerLetterHTML(d){
  const today=new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"});
  const dojL=d.doj?new Date(d.doj).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}):"a mutually agreed date";
  const validL=d.valid?new Date(d.valid).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"}):"";
  const ref="LSA/HR/"+new Date().getFullYear()+"/"+((d.name||"XX").split(" ").map(x=>x[0]||"").join("").toUpperCase())+"-"+String(Date.now()).slice(-3);
  let breakup="";
  if(d.ctc>0){
    const m=d.ctc/12, basic=Math.round(m*0.4), hra=Math.round(basic*0.5), pfEr=Math.round(basic*0.12);
    const special=Math.max(0,Math.round(m-basic-hra-pfEr)), pfEe=Math.round(basic*0.12), pt=200;
    const gross=basic+hra+special, net=gross-pt;
    breakup=`<table class="brk"><thead><tr><th>Earnings</th><th class="r">Monthly (₹)</th><th>Deductions</th><th class="r">Monthly (₹)</th></tr></thead><tbody>
      <tr><td>Basic</td><td class="r">${inr(basic)}</td><td>Professional Tax</td><td class="r">${inr(pt)}</td></tr>
      <tr><td>HRA</td><td class="r">${inr(hra)}</td><td></td><td></td></tr>
      <tr><td>Special Allowance</td><td class="r">${inr(special)}</td><td></td><td></td></tr>
      <tr class="tot"><td>Gross</td><td class="r">${inr(gross)}</td><td>Net Take-Home</td><td class="r">${inr(net)}</td></tr>
    </tbody></table>`;
  }
  return `<div class="ltr">
    <table class="lh"><tr><td><b>LINTEL SPACE ATELIER</b><div class="lh-sub">WHERE LUXURY MEETS FUNCTIONALITY</div></td></tr></table>
    <p class="ref">Ref: ${ref}<br>Date: ${today}</p>
    <p><b>To,</b><br><b>${esc(d.name)}</b>${d.addr?"<br>"+esc(d.addr).replace(/\n/g,"<br>"):""}</p>
    <p><b>Subject: Offer of Employment — ${esc(d.desig||"")}</b></p>
    <p>Dear ${esc((d.name||"Candidate").split(" ")[0])},</p>
    <p>We are delighted to extend this offer of employment to you for the position of <b>${esc(d.desig||"")}</b> at Lintel Space Atelier. Your experience and approach to project delivery align strongly with our studio's philosophy, and we are confident you will be a valuable addition to our team.</p>
    <p>The principal terms of your engagement are set out below. This letter, together with your acceptance, forms the basis of your employment with us.</p>
    <p><b>1. Position &amp; Reporting.</b> You will join as ${esc(d.desig||"")}${d.dept?" in the "+esc(d.dept)+" function":""}, reporting to ${esc(d.report)}. You will be responsible for end-to-end execution of assigned residential and commercial projects, including timeline and cost control, vendor and site coordination, quality assurance, and client communication.</p>
    <p><b>2. Place of Work.</b> Your primary place of work will be Lintel Space Atelier, ${esc(d.loc)}, along with active site presence at project locations as required. The Company may, at its discretion, assign you to any of its offices or project sites.</p>
    <p><b>3. Compensation.</b> You will receive a monthly net take-home salary of <b>${inr(d.net)}</b>, payable on or before the 5th of each subsequent month. This amount is net of applicable statutory deductions (Provident Fund, Professional Tax, and TDS where applicable).${d.ctc>0?" An indicative monthly salary structure is set out below." :" A detailed salary structure will be provided separately with your appointment letter."}</p>
    ${breakup}
    <p><b>4. Date of Joining.</b> Your date of joining will be ${dojL}${validL?". This offer is valid subject to your joining on or before "+validL:""}.</p>
    <p><b>5. Working Hours.</b> Your normal working days will be ${esc(d.days)}, in line with Company policy. Given the nature of project delivery, reasonable flexibility in hours and site availability is expected.</p>
    <p><b>6. Probation &amp; Confirmation.</b> You will be on probation for a period of ${d.prob} (${inWords(d.prob).replace(" Rupees Only","")}) month(s) from your date of joining. Upon satisfactory performance, your services will be confirmed in writing. The Company reserves the right to extend the probation period at its discretion.</p>
    <p><b>7. Notice Period.</b> Either party may terminate this engagement by giving ${d.notice} month(s)' written notice, or salary in lieu thereof, as per Company policy.</p>
    <p><b>8. Confidentiality &amp; Conduct.</b> You will treat all client information, designs, commercials, and Company data as strictly confidential, both during and after your employment. You are expected to uphold the professional standards and values of Lintel Space Atelier at all times.</p>
    <p><b>9. Documentation.</b> This offer is subject to verification of your credentials and submission of standard onboarding documents (identity and address proof, educational and prior-employment records, and passport-size photographs) on or before your joining date.</p>
    <p>We look forward to welcoming you to Lintel Space Atelier and to a long and rewarding association. Kindly sign and return a copy of this letter as a token of your acceptance.</p>
    <p>Warm regards,<br>For Lintel Space Atelier,<br><br><b>Amit Nagar</b><br>Founder &amp; Principal Designer</p>
    <p class="acc"><b>ACCEPTANCE</b><br>I, ${esc(d.name)}, have read and understood the terms above and accept this offer of employment with Lintel Space Atelier.</p>
    <table class="sig"><tr><td>Signature</td><td>Date</td></tr><tr><td>&nbsp;<br>&nbsp;</td><td>&nbsp;</td></tr></table>
    <p class="foot">Lintel Space Atelier · ${esc(d.loc)}, Karnataka · Where luxury meets functionality</p>
  </div>`;
}
function offerPlain(d){
  const dojL=d.doj||"a mutually agreed date";
  return `Dear ${d.name},\n\nWe are delighted to extend this offer of employment for the position of ${d.desig} at Lintel Space Atelier.\n\nReporting to: ${d.report}\nPlace of work: Lintel Space Atelier, ${d.loc}\nMonthly net take-home: ${inr(d.net)} (net of PF, Professional Tax and TDS as applicable)\nDate of joining: ${dojL}\nWorking days: ${d.days}\nProbation: ${d.prob} month(s)\nNotice period: ${d.notice} month(s)\n\nThis offer is subject to verification of your credentials and submission of standard onboarding documents. Please find the formal offer letter attached / to follow.\n\nWe look forward to welcoming you to the Lintel family.\n\nWarm regards,\nAmit Nagar\nFounder & Principal Designer\nFor Lintel Space Atelier`;
}

  w.document.close();
}

  let n=0;
  for(const e of (emps||[])){
    const {data:st}=await sb.from("hr_salary_structures").select("*").eq("employee_id",e.id).maybeSingle();
    if(!st) continue;
    const earnings={Basic:st.basic,HRA:st.hra,"Special Allowance":st.special_allowance};
    const deductions={"Professional Tax":st.professional_tax};
    const gross=Number(st.basic||0)+Number(st.hra||0)+Number(st.special_allowance||0), net=gross-Number(st.professional_tax||0);
    const {error}=await sb.from("hr_salary_slips").upsert({employee_id:e.id,slip_month:mo+"-01",earnings,deductions,gross,net_pay:net,status:"draft",generated_at:new Date().toISOString()},{onConflict:"employee_id,slip_month"});
    if(!error) n++;
  }
  toast(n+" draft slip(s) generated. Review & publish below."); renderAdmin(document.querySelector("#view"),"payroll");
}
async function publishSlip(id){ await sb.from("hr_salary_slips").update({status:"published"}).eq("id",id); toast("Slip published — the employee can now see it."); renderAdmin(document.querySelector("#view"),"payroll"); }
async function deleteSlip(id){ await sb.from("hr_salary_slips").delete().eq("id",id); toast("Draft deleted."); renderAdmin(document.querySelector("#view"),"payroll"); }


/* ===================== ADMIN — leave register & adjustments ===================== */
async function leaveRegisterHTML(EMP, NAME){
  const y=new Date().getFullYear();
  const [reqR, openR] = await Promise.all([
    sb.from("hr_leave_requests").select("employee_id,leave_type,days,status,from_date"),
    sb.from("hr_leave_opening").select("*").eq("year",y)
  ]);
  const used={}, pend={}, open={};
  (reqR.data||[]).forEach(r=>{
    if(r.status==="approved" && (r.from_date||"").slice(0,4)==String(y)){ (used[r.employee_id]=used[r.employee_id]||{})[r.leave_type]=((used[r.employee_id]||{})[r.leave_type]||0)+Number(r.days||0); }
    if(r.status==="pending"){ pend[r.employee_id]=(pend[r.employee_id]||0)+1; }
  });
  (openR.data||[]).forEach(o=>{ (open[o.employee_id]=open[o.employee_id]||{})[o.leave_type]=Number(o.taken); });
  const ids=Object.keys(EMP).filter(id=>EMP[id].status!=="exited").sort((a,b)=>(NAME[a]||"").localeCompare(NAME[b]||""));
  const cell=(id,t)=>{ const e=EMP[id]; const acc=accruedFor(e.date_of_joining,e.probation_months,t); const tk=((used[id]||{})[t]||0)+((open[id]||{})[t]||0); return `${tk} / ${Math.max(0,acc-tk)}`; };
  return `<div class="card" style="margin-top:16px">
    <div class="row-head"><h3>Leave register (${y})</h3></div>
    <div class="h3sub" style="margin-bottom:10px">Each cell shows <b>taken / available</b>. Use Edit to record leave already taken this year.</div>
    <div style="overflow-x:auto"><table class="t"><thead><tr><th>Employee</th><th>Casual</th><th>Sick</th><th>Privilege</th><th>Pending</th><th></th></tr></thead><tbody>
      ${ids.length? ids.map(id=>`<tr>
        <td style="font-weight:600">${esc(NAME[id]||"—")}</td>
        <td>${cell(id,"casual")}</td><td>${cell(id,"sick")}</td><td>${cell(id,"earned")}</td>
        <td>${pend[id]?`<span class="pill warn">${pend[id]}</span>`:"0"}</td>
        <td style="text-align:right"><button class="btn ghost sm" onclick="editLeave('${id}')">Edit</button></td>
      </tr>`).join("") : `<tr><td colspan="6" class="empty">No employees.</td></tr>`}
    </tbody></table></div></div>`;
}
async function editLeave(empId){
  const {data:e}=await sb.from("employees").select("full_name").eq("id",empId).maybeSingle();
  const y=new Date().getFullYear();
  const {data:op}=await sb.from("hr_leave_opening").select("*").eq("employee_id",empId).eq("year",y);
  const m={}; (op||[]).forEach(o=>m[o.leave_type]=o.taken);
  openModal("Leave taken this year — "+esc(e?.full_name||""), `
    <div class="h3sub" style="margin-bottom:12px">Days already taken THIS YEAR (before the system, or manual adjustment). These add to leave recorded in the app.</div>
    <div class="grid3">
      <label class="fld"><span>Casual taken</span><input id="lo-casual" type="number" step="0.5" value="${m.casual??0}"/></label>
      <label class="fld"><span>Sick taken</span><input id="lo-sick" type="number" step="0.5" value="${m.sick??0}"/></label>
      <label class="fld"><span>Privilege taken</span><input id="lo-earned" type="number" step="0.5" value="${m.earned??0}"/></label>
    </div>
    <button class="btn brass full" onclick="saveLeaveOpening('${empId}')">Save</button>`);
}
async function saveLeaveOpening(empId){
  const y=new Date().getFullYear();
  const rows=["casual","sick","earned"].map(t=>({employee_id:empId,leave_type:t,year:y,taken:Number(document.querySelector("#lo-"+t).value||0),updated_at:new Date().toISOString()}));
  const {error}=await sb.from("hr_leave_opening").upsert(rows,{onConflict:"employee_id,leave_type,year"});
  if(error) return toast("Save failed: "+error.message);
  closeModal(); toast("Leave register updated."); renderAdmin(document.querySelector("#view"),"leave");
}


/* ===================== PHOTO CROPPER ===================== */
function openCropper(file, onDone){
  const url=URL.createObjectURL(file), img=new Image();
  img.onload=()=>{
    openModal("Adjust your photo", `<div style="text-align:center">
      <div class="h3sub" style="margin-bottom:8px">Drag to reposition · slider to zoom</div>
      <canvas id="cropCanvas" width="260" height="260" style="border-radius:50%;touch-action:none;cursor:grab;background:#e9e4d8;border:3px solid var(--brass);max-width:100%"></canvas>
      <input id="cropZoom" type="range" min="1" max="3" step="0.01" value="1" style="width:260px;max-width:100%;display:block;margin:14px auto"/>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn ghost" onclick="closeModal()">Cancel</button>
        <button class="btn brass" id="cropSave">Use photo</button>
      </div></div>`);
    const V=260, cv=document.querySelector("#cropCanvas"), ctx=cv.getContext("2d");
    const base=Math.max(V/img.width, V/img.height);
    let zoom=1, scale=base, tx=(V-img.width*base)/2, ty=(V-img.height*base)/2;
    function clamp(){ const w=img.width*scale, h=img.height*scale; tx=Math.min(0,Math.max(V-w,tx)); ty=Math.min(0,Math.max(V-h,ty)); }
    function draw(){ ctx.clearRect(0,0,V,V); ctx.save(); ctx.translate(tx,ty); ctx.scale(scale,scale); ctx.drawImage(img,0,0); ctx.restore(); }
    draw();
    function pt(e){ const t=e.touches&&e.touches[0]?e.touches[0]:e; const r=cv.getBoundingClientRect(); return {x:(t.clientX-r.left)*(cv.width/r.width), y:(t.clientY-r.top)*(cv.height/r.height)}; }
    let drag=false,sx=0,sy=0;
    function down(e){ drag=true; const p=pt(e); sx=p.x-tx; sy=p.y-ty; if(e.cancelable)e.preventDefault(); }
    function move(e){ if(!drag)return; const p=pt(e); tx=p.x-sx; ty=p.y-sy; clamp(); draw(); if(e.cancelable)e.preventDefault(); }
    function up(){ drag=false; }
    cv.addEventListener("mousedown",down); cv.addEventListener("mousemove",move); cv.addEventListener("mouseup",up); cv.addEventListener("mouseleave",up);
    cv.addEventListener("touchstart",down,{passive:false}); cv.addEventListener("touchmove",move,{passive:false}); cv.addEventListener("touchend",up);
    document.querySelector("#cropZoom").oninput=e=>{ const cx=V/2,cy=V/2,old=scale; zoom=Number(e.target.value); scale=base*zoom; tx=cx-(cx-tx)*(scale/old); ty=cy-(cy-ty)*(scale/old); clamp(); draw(); };
    document.querySelector("#cropSave").onclick=()=>{
      const out=document.createElement("canvas"); out.width=512; out.height=512; const o=out.getContext("2d"); const f=512/V;
      o.save(); o.translate(tx*f,ty*f); o.scale(scale*f,scale*f); o.drawImage(img,0,0); o.restore();
      out.toBlob(b=>{ URL.revokeObjectURL(url); closeModal(); if(b) onDone(b); }, "image/jpeg", 0.9);
    };
  };
  img.onerror=()=>{ toast("Couldn't read that image."); URL.revokeObjectURL(url); };
  img.src=url;
}

/* ===================== ATTENDANCE ===================== */
async function markLogin(){
  try{
    const d=todayISO();
    const {data:row}=await sb.from("hr_attendance").select("employee_id").eq("employee_id",ME.id).eq("day",d).maybeSingle();
    if(!row) await sb.from("hr_attendance").insert({employee_id:ME.id,day:d,first_login:new Date().toISOString(),last_seen:new Date().toISOString()});
    else await sb.from("hr_attendance").update({last_seen:new Date().toISOString()}).eq("employee_id",ME.id).eq("day",d);
  }catch(e){}
}


/* ===================== ADMIN — add a new employee ===================== */
async function addEmp(){
  const {data:mg}=await sb.from("employees").select("id,full_name").eq("status","active").order("full_name");
  const opts=(mg||[]).map(m=>`<option value="${m.id}">${esc(m.full_name)}</option>`).join("");
  const et=["full_time","intern","contract","consultant"].map(t=>`<option value="${t}">${t.replace(/_/g," ")}</option>`).join("");
  const al=["employee","hr","admin"].map(t=>`<option value="${t}">${t}</option>`).join("");
  openModal("Add employee", `
    <div class="h3sub" style="margin-bottom:12px">The work email must be the exact @lintelspace.com Google account they'll sign in with.</div>
    <div class="grid2">
      <label class="fld"><span>Full name *</span><input id="ne-full_name"/></label>
      <label class="fld"><span>Work email *</span><input id="ne-work_email" type="email" placeholder="name@lintelspace.com"/></label>
      <label class="fld"><span>Employee code</span><input id="ne-emp_code"/></label>
      <label class="fld"><span>Designation</span><input id="ne-designation"/></label>
      <label class="fld"><span>Department</span><input id="ne-department"/></label>
      <label class="fld"><span>Employment type</span><select id="ne-employment_type">${et}</select></label>
      <label class="fld"><span>Date of joining</span><input id="ne-date_of_joining" type="date"/></label>
      <label class="fld"><span>Probation (months)</span><input id="ne-probation_months" type="number" value="6"/></label>
      <label class="fld"><span>Work location</span><input id="ne-work_location" value="Bengaluru"/></label>
      <label class="fld"><span>Reporting manager</span><select id="ne-manager_id"><option value="">— none —</option>${opts}</select></label>
      <label class="fld"><span>Access level</span><select id="ne-access_level">${al}</select></label>
    </div>
    <button class="btn brass full" onclick="saveNewEmp()">Add employee</button>`);
}
async function saveNewEmp(){
  const v=k=>document.querySelector("#ne-"+k).value.trim();
  const name=v("full_name"), email=v("work_email").toLowerCase();
  if(!name) return toast("Enter the employee's full name.");
  if(!email.endsWith("@lintelspace.com")) return toast("Work email must be an @lintelspace.com address.");
  const row={ full_name:name, work_email:email, emp_code:v("emp_code")||null, designation:v("designation")||null,
    department:v("department")||null, employment_type:v("employment_type"),
    date_of_joining:v("date_of_joining")||null, probation_months:Number(v("probation_months")||6),
    work_location:v("work_location")||null, manager_id:v("manager_id")||null,
    access_level:v("access_level"), status:"active" };
  const {error}=await sb.from("employees").insert(row);
  if(error){ const m=String(error.message||"").toLowerCase(); if(m.includes("duplicate")||m.includes("unique")) return toast("An employee with that work email already exists."); return toast("Couldn't add: "+error.message); }
  closeModal(); toast("Employee added — they can now sign in with that email."); renderAdmin(document.querySelector("#view"),"employees");
}
